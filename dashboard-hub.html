<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard 聚合中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 20px 30px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            color: #f8fafc;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-secondary {
            background: #475569;
            color: white;
        }

        .btn-secondary:hover {
            background: #64748b;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-success {
            background: #22c55e;
            color: white;
        }

        .btn-success:hover {
            background: #16a34a;
        }

        .filters-bar {
            background: #1e293b;
            padding: 15px 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            font-size: 13px;
            color: #94a3b8;
        }

        .filter-group select,
        .filter-group input {
            padding: 8px 12px;
            border: 1px solid #475569;
            border-radius: 6px;
            background: #334155;
            color: #f8fafc;
            font-size: 14px;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .main-content {
            display: flex;
            height: calc(100vh - 140px);
        }

        .sidebar {
            width: 300px;
            background: #1e293b;
            border-right: 1px solid #334155;
            overflow-y: auto;
            padding: 15px;
        }

        .sidebar-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .dashboard-item {
            background: #334155;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .dashboard-item:hover {
            background: #475569;
        }

        .dashboard-item.active {
            border-color: #3b82f6;
            background: #1e3a5f;
        }

        .dashboard-item .name {
            font-weight: 500;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dashboard-item .lock-icon {
            font-size: 12px;
        }

        .dashboard-item .url {
            font-size: 11px;
            color: #94a3b8;
            word-break: break-all;
            margin-bottom: 4px;
        }

        .dashboard-item .login-status {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 6px;
            display: inline-block;
        }

        .dashboard-item .login-status.auto-login {
            background: #8b5cf6;
            color: white;
        }

        .dashboard-item .login-status.need-login {
            background: #f59e0b;
            color: white;
        }

        .dashboard-item .login-status.no-login {
            background: #22c55e;
            color: white;
        }

        .dashboard-item .tags {
            display: flex;
            gap: 5px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .dashboard-item .tag {
            font-size: 10px;
            padding: 2px 8px;
            background: #3b82f6;
            border-radius: 10px;
            color: white;
        }

        .dashboard-item .actions {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }

        .dashboard-item .actions button {
            padding: 4px 8px;
            font-size: 11px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .tabs-bar {
            background: #1e293b;
            padding: 0 15px;
            display: flex;
            gap: 5px;
            border-bottom: 1px solid #334155;
            overflow-x: auto;
        }

        .tab {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            font-size: 14px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab:hover {
            color: #e2e8f0;
        }

        .tab.active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
        }

        .tab .lock-icon {
            font-size: 12px;
        }

        .tab .close-btn {
            color: #64748b;
            margin-left: 4px;
        }

        .tab .close-btn:hover {
            color: #ef4444;
        }

        .iframe-container {
            flex: 1;
            display: flex;
            gap: 10px;
            padding: 15px;
            overflow: auto;
        }

        .iframe-wrapper {
            flex: 1;
            min-width: 400px;
            display: flex;
            flex-direction: column;
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
        }

        .iframe-header {
            padding: 12px 15px;
            background: #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .iframe-header .title {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .iframe-header .actions {
            display: flex;
            gap: 8px;
        }

        .iframe-header button {
            padding: 4px 10px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .iframe-header .btn-refresh {
            background: #475569;
            color: white;
        }

        .iframe-header .btn-fullscreen {
            background: #3b82f6;
            color: white;
        }

        .iframe-header .btn-login {
            background: #f59e0b;
            color: white;
        }

        .iframe-wrapper iframe {
            flex: 1;
            border: none;
            background: white;
        }

        /* Login Helper Panel */
        .login-helper {
            background: #1e293b;
            border: 2px solid #f59e0b;
            border-radius: 12px;
            margin: 15px;
            overflow: hidden;
        }

        .login-helper-header {
            background: #f59e0b;
            color: white;
            padding: 12px 15px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .login-helper-header .close-btn {
            cursor: pointer;
            font-size: 18px;
        }

        .login-helper-body {
            padding: 15px;
        }

        .login-helper-body .info {
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .login-helper-body .credentials {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .login-helper-body .credential-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .login-helper-body .credential-group label {
            font-size: 12px;
            color: #94a3b8;
        }

        .login-helper-body .credential-group input {
            padding: 8px 10px;
            border: 1px solid #475569;
            border-radius: 6px;
            background: #334155;
            color: #f8fafc;
            font-size: 14px;
        }

        .login-helper-body .credential-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .login-helper-body .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .login-helper-body .btn-row button {
            flex: 1;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #64748b;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h2 {
            margin-bottom: 10px;
            color: #94a3b8;
        }

        .empty-state p {
            margin-bottom: 20px;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: #1e293b;
            border-radius: 12px;
            width: 550px;
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 18px;
        }

        .modal-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 24px;
            cursor: pointer;
        }

        .modal-close:hover {
            color: #e2e8f0;
        }

        .modal-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #94a3b8;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #475569;
            border-radius: 6px;
            background: #334155;
            color: #f8fafc;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .form-group-inline {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group-inline input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .form-group-inline label {
            margin-bottom: 0;
            cursor: pointer;
        }

        /* Login mode selection */
        .login-mode-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .login-mode-option {
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-mode-option:hover {
            border-color: #475569;
        }

        .login-mode-option.selected {
            border-color: #3b82f6;
            background: #1e3a5f;
        }

        .login-mode-option .mode-title {
            font-weight: 500;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .login-mode-option .mode-desc {
            font-size: 12px;
            color: #94a3b8;
        }

        .credentials-section {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
        }

        .credentials-section h4 {
            color: #f59e0b;
            margin-bottom: 12px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .auto-login-info {
            background: #8b5cf6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
        }

        .auto-login-info .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .auto-login-info .text {
            font-size: 14px;
            color: white;
        }

        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid #334155;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* Tag input */
        .tag-input-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 8px;
            border: 1px solid #475569;
            border-radius: 6px;
            background: #334155;
            min-height: 42px;
        }

        .tag-input-container:focus-within {
            border-color: #3b82f6;
        }

        .tag-input-container .tag {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: #3b82f6;
            border-radius: 12px;
            font-size: 13px;
        }

        .tag-input-container .tag .remove {
            cursor: pointer;
            font-size: 14px;
        }

        .tag-input-container input {
            flex: 1;
            min-width: 100px;
            border: none;
            background: transparent;
            color: #f8fafc;
            font-size: 14px;
            outline: none;
        }

        /* Fullscreen mode */
        .fullscreen-mode {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0f172a;
            z-index: 2000;
            display: flex;
            flex-direction: column;
        }

        .fullscreen-mode .toolbar {
            background: #1e293b;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .fullscreen-mode .toolbar h3 {
            color: #f8fafc;
        }

        .fullscreen-mode .toolbar-actions {
            display: flex;
            gap: 10px;
        }

        .fullscreen-mode iframe {
            flex: 1;
            border: none;
            background: white;
        }

        /* Quick add bar */
        .quick-add {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #475569;
        }

        .quick-add input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #475569;
            border-radius: 6px;
            background: #334155;
            color: #f8fafc;
            font-size: 14px;
        }

        .quick-add input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .quick-add input::placeholder {
            color: #64748b;
        }

        /* Password visibility toggle */
        .password-field {
            position: relative;
        }

        .password-field input {
            padding-right: 40px;
        }

        .password-field .toggle-visibility {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 16px;
        }

        .password-field .toggle-visibility:hover {
            color: #e2e8f0;
        }

        /* Warning for empty credentials */
        .warning-banner {
            background: #8b5cf6;
            color: white;
            padding: 8px 15px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }
            
            .iframe-container {
                flex-direction: column;
            }
            
            .iframe-wrapper {
                min-width: 100%;
                height: 50%;
            }

            .login-mode-selector {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="9"></rect>
                <rect x="14" y="3" width="7" height="5"></rect>
                <rect x="14" y="12" width="7" height="9"></rect>
                <rect x="3" y="16" width="7" height="5"></rect>
            </svg>
            Dashboard 聚合中心
        </h1>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="exportData()">导出配置</button>
            <button class="btn btn-secondary" onclick="importData()">导入配置</button>
            <button class="btn btn-primary" onclick="openAddModal()">+ 添加 Dashboard</button>
        </div>
    </header>

    <div class="filters-bar">
        <div class="filter-group">
            <label>标签筛选:</label>
            <select id="tagFilter" onchange="applyFilters()">
                <option value="">全部</option>
            </select>
        </div>
        <div class="filter-group">
            <label>登录方式:</label>
            <select id="loginFilter" onchange="applyFilters()">
                <option value="">全部</option>
                <option value="auto">浏览器自动登录</option>
                <option value="manual">手动输入密码</option>
                <option value="none">无需登录</option>
            </select>
        </div>
        <div class="filter-group">
            <label>搜索:</label>
            <input type="text" id="searchFilter" placeholder="搜索名称或URL..." oninput="applyFilters()">
        </div>
        <button class="btn btn-secondary" onclick="clearFilters()">清除筛选</button>
        <span style="margin-left: auto; color: #64748b; font-size: 13px;">
            已加载 <span id="dashboardCount">0</span> 个 Dashboard
        </span>
    </div>

    <div class="main-content">
        <aside class="sidebar">
            <div class="sidebar-title">我的 Dashboards</div>
            <div id="dashboardList"></div>
            <div class="quick-add">
                <input type="text" id="quickAddUrl" placeholder="快速添加 URL..." onkeypress="handleQuickAdd(event)">
                <button class="btn btn-primary" onclick="quickAdd()">添加</button>
            </div>
        </aside>

        <main class="content-area">
            <div class="tabs-bar" id="tabsBar"></div>
            <div class="login-helper" id="loginHelper" style="display: none;">
                <div class="login-helper-header">
                    <span>🔐 登录助手 - <span id="helperTitle"></span></span>
                    <span class="close-btn" onclick="hideLoginHelper()">×</span>
                </div>
                <div class="login-helper-body">
                    <div class="info">输入登录凭证，然后点击「填入并登录」将自动填入网页表单</div>
                    <div class="credentials">
                        <div class="credential-group">
                            <label>用户名 / 邮箱</label>
                            <input type="text" id="helperUsername" placeholder="请输入用户名">
                        </div>
                        <div class="credential-group password-field">
                            <label>密码</label>
                            <input type="password" id="helperPassword" placeholder="请输入密码">
                            <button type="button" class="toggle-visibility" onclick="togglePasswordVisibility('helperPassword')">👁</button>
                        </div>
                    </div>
                    <div class="btn-row">
                        <button class="btn btn-success" onclick="fillAndLogin()">填入并登录</button>
                        <button class="btn btn-secondary" onclick="copyCredentials()">复制凭证</button>
                        <button class="btn btn-secondary" onclick="openInNewTab()">新标签页打开</button>
                    </div>
                </div>
            </div>
            <div class="iframe-container" id="iframeContainer">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="7" height="9"></rect>
                        <rect x="14" y="3" width="7" height="5"></rect>
                        <rect x="14" y="12" width="7" height="9"></rect>
                        <rect x="3" y="16" width="7" height="5"></rect>
                    </svg>
                    <h2>欢迎使用 Dashboard 聚合中心</h2>
                    <p>从左侧添加你要监控的 Dashboard，点击即可查看</p>
                    <button class="btn btn-primary" onclick="openAddModal()">+ 添加第一个 Dashboard</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div id="addModal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">添加 Dashboard</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>名称 *</label>
                    <input type="text" id="dashName" placeholder="例如: 淘宝商家后台">
                </div>
                <div class="form-group">
                    <label>URL *</label>
                    <input type="url" id="dashUrl" placeholder="https://example.com/dashboard">
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="dashDesc" placeholder="简要描述这个 Dashboard 的用途..."></textarea>
                </div>

                <!-- Login Mode Selection -->
                <div class="form-group">
                    <label>登录方式</label>
                    <div class="login-mode-selector">
                        <div class="login-mode-option selected" data-mode="auto" onclick="selectLoginMode('auto')">
                            <div class="mode-title">
                                <span>🌐</span> 浏览器自动登录
                            </div>
                            <div class="mode-desc">使用 Edge 已登录的账户，无需保存密码</div>
                        </div>
                        <div class="login-mode-option" data-mode="manual" onclick="selectLoginMode('manual')">
                            <div class="mode-title">
                                <span>🔑</span> 手动输入密码
                            </div>
                            <div class="mode-desc">保存用户名和密码到本地</div>
                        </div>
                        <div class="login-mode-option" data-mode="none" onclick="selectLoginMode('none')">
                            <div class="mode-title">
                                <span>🔓</span> 无需登录
                            </div>
                            <div class="mode-desc">公开访问的网站</div>
                        </div>
                    </div>
                    <input type="hidden" id="dashLoginMode" value="auto">
                </div>

                <!-- Auto login info -->
                <div class="auto-login-info" id="autoLoginInfo">
                    <div class="icon">✅</div>
                    <div class="text">将使用 Edge 浏览器的已登录会话访问此网站</div>
                </div>

                <!-- Manual credentials section -->
                <div class="credentials-section" id="credentialsSection" style="display: none;">
                    <h4>🔐 登录凭证 (保存在本地)</h4>
                    <div class="form-group">
                        <label>用户名 / 邮箱</label>
                        <input type="text" id="dashUsername" placeholder="保存后可直接填入">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <div class="password-field">
                            <input type="password" id="dashPassword" placeholder="密码将安全保存在本地">
                            <button type="button" class="toggle-visibility" onclick="togglePasswordVisibility('dashPassword')">👁</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>登录说明</label>
                        <textarea id="dashLoginNote" placeholder="如: 需要手机验证码、登录后选择公司等..."></textarea>
                    </div>
                </div>

                <div class="form-group">
                    <label>分类</label>
                    <select id="dashCategory">
                        <option value="general">通用</option>
                        <option value="business">商业</option>
                        <option value="analytics">数据分析</option>
                        <option value="monitoring">监控</option>
                        <option value="social">社交媒体</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>标签 (按回车添加)</label>
                    <div class="tag-input-container" id="tagContainer">
                        <input type="text" id="tagInput" placeholder="输入标签后按回车..." onkeypress="handleTagInput(event)">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveDashboard()">保存</button>
            </div>
        </div>
    </div>

    <!-- Fullscreen Modal -->
    <div id="fullscreenModal" class="fullscreen-mode" style="display: none;">
        <div class="toolbar">
            <h3 id="fullscreenTitle">Dashboard</h3>
            <div class="toolbar-actions">
                <button class="btn btn-login" id="fullscreenLoginBtn" style="display: none;" onclick="showFullscreenLoginHelper()">🔐 登录助手</button>
                <button class="btn btn-secondary" onclick="refreshFullscreen()">刷新</button>
                <button class="btn btn-primary" onclick="exitFullscreen()">退出全屏</button>
            </div>
        </div>
        <div id="fullscreenLoginHelper" class="login-helper" style="display: none; margin: 0; border-radius: 0;">
            <div class="login-helper-header">
                <span>🔐 登录助手</span>
                <span class="close-btn" onclick="document.getElementById('fullscreenLoginHelper').style.display='none'">×</span>
            </div>
            <div class="login-helper-body">
                <div class="credentials">
                    <div class="credential-group">
                        <label>用户名</label>
                        <input type="text" id="fsHelperUsername" placeholder="请输入用户名">
                    </div>
                    <div class="credential-group password-field">
                        <label>密码</label>
                        <input type="password" id="fsHelperPassword" placeholder="请输入密码">
                        <button type="button" class="toggle-visibility" onclick="togglePasswordVisibility('fsHelperPassword')">👁</button>
                    </div>
                </div>
                <div class="btn-row">
                    <button class="btn btn-success" onclick="fsFillAndLogin()">填入并登录</button>
                    <button class="btn btn-secondary" onclick="document.getElementById('fullscreenLoginHelper').style.display='none'">关闭</button>
                </div>
            </div>
        </div>
        <iframe id="fullscreenIframe" src=""></iframe>
    </div>

    <script>
        // Data store
        let dashboards = [];
        let activeTabs = [];
        let currentTags = [];
        let allTags = new Set();
        let currentLoginDashboard = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            renderDashboardList();
            updateTagFilter();
            updateDashboardCount();
        });

        // LocalStorage operations
        function loadData() {
            const saved = localStorage.getItem('dashboardAggregator');
            if (saved) {
                dashboards = JSON.parse(saved);
                // Migrate old data format
                dashboards.forEach(d => {
                    if (d.needLogin !== undefined && d.loginMode === undefined) {
                        // Old format: convert to new format
                        d.loginMode = d.needLogin ? 'manual' : 'none';
                    }
                    if (d.tags) {
                        d.tags.forEach(t => allTags.add(t));
                    }
                });
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem('dashboardAggregator', JSON.stringify(dashboards));
        }

        // Render dashboard list
        function renderDashboardList() {
            const container = document.getElementById('dashboardList');
            const searchTerm = document.getElementById('searchFilter').value.toLowerCase();
            const selectedTag = document.getElementById('tagFilter').value;
            const loginFilter = document.getElementById('loginFilter').value;

            let filtered = dashboards;

            if (searchTerm) {
                filtered = filtered.filter(d => 
                    d.name.toLowerCase().includes(searchTerm) || 
                    d.url.toLowerCase().includes(searchTerm)
                );
            }

            if (selectedTag) {
                filtered = filtered.filter(d => d.tags && d.tags.includes(selectedTag));
            }

            if (loginFilter) {
                filtered = filtered.filter(d => d.loginMode === loginFilter);
            }

            container.innerHTML = filtered.map(d => `
                <div class="dashboard-item ${activeTabs.includes(d.id) ? 'active' : ''}" 
                     onclick="openDashboard('${d.id}')">
                    <div class="name">
                        ${getLoginIcon(d.loginMode)}
                        ${escapeHtml(d.name)}
                    </div>
                    <div class="url">${escapeHtml(d.url)}</div>
                    <span class="login-status ${getLoginStatusClass(d.loginMode)}">
                        ${getLoginStatusText(d.loginMode)}
                    </span>
                    ${d.tags && d.tags.length ? `
                        <div class="tags">
                            ${d.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
                        </div>
                    ` : ''}
                    <div class="actions">
                        <button class="btn-secondary" onclick="event.stopPropagation(); openEditModal('${d.id}')">编辑</button>
                        <button class="btn-danger" onclick="event.stopPropagation(); deleteDashboard('${d.id}')">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function getLoginIcon(mode) {
            switch(mode) {
                case 'auto': return '<span class="lock-icon" title="浏览器自动登录">🌐</span>';
                case 'manual': return '<span class="lock-icon" title="手动输入密码">🔑</span>';
                default: return '<span class="lock-icon" title="无需登录">🔓</span>';
            }
        }

        function getLoginStatusClass(mode) {
            switch(mode) {
                case 'auto': return 'auto-login';
                case 'manual': return 'need-login';
                default: return 'no-login';
            }
        }

        function getLoginStatusText(mode) {
            switch(mode) {
                case 'auto': return '浏览器自动登录';
                case 'manual': return '需要登录';
                default: return '无需登录';
            }
        }

        // Update tag filter dropdown
        function updateTagFilter() {
            const select = document.getElementById('tagFilter');
            select.innerHTML = '<option value="">全部</option>' + 
                Array.from(allTags).map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
        }

        // Update dashboard count
        function updateDashboardCount() {
            document.getElementById('dashboardCount').textContent = dashboards.length;
        }

        // Apply filters
        function applyFilters() {
            renderDashboardList();
        }

        function clearFilters() {
            document.getElementById('tagFilter').value = '';
            document.getElementById('loginFilter').value = '';
            document.getElementById('searchFilter').value = '';
            renderDashboardList();
        }

        // Open dashboard in tabs
        function openDashboard(id) {
            const dashboard = dashboards.find(d => d.id === id);
            if (!dashboard) return;

            if (!activeTabs.includes(id)) {
                activeTabs.push(id);
            }

            renderTabs();
            renderIframes();
            
            // Show login helper if needed
            if (dashboard.loginMode === 'manual') {
                showLoginHelper(dashboard.id);
            }
        }

        // Show login helper
        function showLoginHelper(id) {
            const dashboard = dashboards.find(d => d.id === id);
            if (!dashboard) return;
            
            currentLoginDashboard = dashboard;
            
            document.getElementById('helperTitle').textContent = dashboard.name;
            document.getElementById('helperUsername').value = dashboard.username || '';
            document.getElementById('helperPassword').value = dashboard.password || '';
            document.getElementById('loginHelper').style.display = 'block';
        }

        function hideLoginHelper() {
            document.getElementById('loginHelper').style.display = 'none';
            currentLoginDashboard = null;
        }

        // Fill credentials and attempt auto-login
        function fillAndLogin() {
            const username = document.getElementById('helperUsername').value;
            const password = document.getElementById('helperPassword').value;
            
            if (!currentLoginDashboard) return;
            
            // Try to fill the iframe form using postMessage
            const iframe = document.getElementById(`iframe-${currentLoginDashboard.id}`);
            if (iframe && iframe.contentWindow) {
                try {
                    iframe.contentWindow.postMessage({
                        type: 'FILL_CREDENTIALS',
                        username: username,
                        password: password
                    }, '*');
                    
                    // Also try common selectors
                    const scripts = `
                        <script>
                            window.addEventListener('message', function(e) {
                                if (e.data.type === 'FILL_CREDENTIALS') {
                                    // Try common username selectors
                                    const selectors = [
                                        'input[name="username"]', 'input[name="email"]', 'input[name="login"]',
                                        'input[type="text"]', 'input[id*="username"]', 'input[id*="user"]',
                                        'input[placeholder*="用户名"]', 'input[placeholder*="账号"]', 'input[placeholder*="邮箱"]'
                                    ];
                                    for (let sel of selectors) {
                                        const el = document.querySelector(sel);
                                        if (el) { el.value = e.data.username; el.dispatchEvent(new Event('input', {bubbles: true})); break; }
                                    }
                                    // Try common password selectors
                                    const pSelectors = [
                                        'input[name="password"]', 'input[type="password"]',
                                        'input[id*="password"]', 'input[placeholder*="密码"]'
                                    ];
                                    for (let sel of pSelectors) {
                                        const el = document.querySelector(sel);
                                        if (el) { el.value = e.data.password; el.dispatchEvent(new Event('input', {bubbles: true})); break; }
                                    }
                                }
                            });
                        <\/script>
                    `;
                    
                    // Inject script into iframe
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    if (iframeDoc.body) {
                        const script = iframeDoc.createElement('script');
                        script.textContent = scripts.replace(/<\/?script>/g, '');
                        iframeDoc.body.appendChild(script);
                        iframe.contentWindow.postMessage({
                            type: 'FILL_CREDENTIALS',
                            username: username,
                            password: password
                        }, '*');
                    }
                } catch (e) {
                    console.log('Cannot access iframe directly due to CORS');
                }
            }
            
            // Save to dashboard for next time
            currentLoginDashboard.username = username;
            currentLoginDashboard.password = password;
            saveData();
            
            // Show notification
            showNotification('凭证已保存，请在网页中点击登录按钮');
        }

        // Copy credentials to clipboard
        function copyCredentials() {
            const username = document.getElementById('helperUsername').value;
            const password = document.getElementById('helperPassword').value;
            
            navigator.clipboard.writeText(`用户名: ${username}\n密码: ${password}`).then(() => {
                showNotification('凭证已复制到剪贴板');
            });
        }

        // Open in new tab
        function openInNewTab() {
            if (currentLoginDashboard) {
                window.open(currentLoginDashboard.url, '_blank');
            }
        }

        // Render tabs
        function renderTabs() {
            const container = document.getElementById('tabsBar');
            container.innerHTML = activeTabs.map(id => {
                const d = dashboards.find(d => d.id === id);
                if (!d) return '';
                return `
                    <div class="tab ${activeTabs.indexOf(id) === activeTabs.length - 1 ? 'active' : ''}" onclick="switchTab('${d.id}')">
                        ${getLoginIcon(d.loginMode)}
                        ${escapeHtml(d.name)}
                        <span class="close-btn" onclick="event.stopPropagation(); closeTab('${d.id}')">&times;</span>
                    </div>
                `;
            }).join('');
        }

        // Render iframes
        function renderIframes() {
            const container = document.getElementById('iframeContainer');
            
            if (activeTabs.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="7" height="9"></rect>
                            <rect x="14" y="3" width="7" height="5"></rect>
                            <rect x="14" y="12" width="7" height="9"></rect>
                            <rect x="3" y="16" width="7" height="5"></rect>
                        </svg>
                        <h2>欢迎使用 Dashboard 聚合中心</h2>
                        <p>从左侧添加你要监控的 Dashboard，点击即可查看</p>
                        <button class="btn btn-primary" onclick="openAddModal()">+ 添加第一个 Dashboard</button>
                    </div>
                `;
                return;
            }

            container.innerHTML = activeTabs.map(id => {
                const d = dashboards.find(d => d.id === id);
                if (!d) return '';
                const showHelper = d.loginMode === 'manual' && currentLoginDashboard?.id === d.id;
                return `
                    <div class="iframe-wrapper" id="frame-${id}">
                        ${showHelper ? `
                            <div class="warning-banner" style="background: #f59e0b;">
                                🔑 此页面需要手动登录，请使用上方「登录助手」填入凭证
                            </div>
                        ` : ''}
                        ${d.loginMode === 'auto' ? `
                            <div class="warning-banner">
                                🌐 使用浏览器自动登录 - 请确保已在 Edge 中登录此网站
                            </div>
                        ` : ''}
                        <div class="iframe-header">
                            <span class="title">
                                ${getLoginIcon(d.loginMode)}
                                ${escapeHtml(d.name)}
                            </span>
                            <div class="actions">
                                ${d.loginMode === 'manual' ? `<button class="btn-login" onclick="showLoginHelper('${d.id}')">登录助手</button>` : ''}
                                <button class="btn-refresh" onclick="refreshIframe('${id}')">刷新</button>
                                <button class="btn-fullscreen" onclick="openFullscreen('${id}')">全屏</button>
                            </div>
                        </div>
                        <iframe id="iframe-${id}" src="${escapeHtml(d.url)}" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-pointer-lock"></iframe>
                    </div>
                `;
            }).join('');
        }

        // Tab operations
        function switchTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.closest('.tab')?.classList.add('active');
        }

        function closeTab(id) {
            activeTabs = activeTabs.filter(t => t !== id);
            if (currentLoginDashboard?.id === id) {
                hideLoginHelper();
            }
            renderTabs();
            renderIframes();
        }

        // Refresh iframe
        function refreshIframe(id) {
            const iframe = document.getElementById(`iframe-${id}`);
            if (iframe) {
                iframe.src = iframe.src;
            }
        }

        // Fullscreen
        function openFullscreen(id) {
            const dashboard = dashboards.find(d => d.id === id);
            if (!dashboard) return;

            document.getElementById('fullscreenTitle').textContent = dashboard.name;
            document.getElementById('fullscreenIframe').src = dashboard.url;
            document.getElementById('fullscreenLoginBtn').style.display = dashboard.loginMode === 'manual' ? 'inline-block' : 'none';
            
            if (dashboard.loginMode === 'manual') {
                document.getElementById('fsHelperUsername').value = dashboard.username || '';
                document.getElementById('fsHelperPassword').value = dashboard.password || '';
            }
            
            document.getElementById('fullscreenModal').style.display = 'flex';
        }

        function showFullscreenLoginHelper() {
            document.getElementById('fullscreenLoginHelper').style.display = 'block';
        }

        function fsFillAndLogin() {
            const username = document.getElementById('fsHelperUsername').value;
            const password = document.getElementById('fsHelperPassword').value;
            
            const iframe = document.getElementById('fullscreenIframe');
            if (iframe && iframe.contentWindow) {
                try {
                    iframe.contentWindow.postMessage({
                        type: 'FILL_CREDENTIALS',
                        username: username,
                        password: password
                    }, '*');
                } catch (e) {
                    console.log('Cannot access iframe due to CORS');
                }
            }
            
            showNotification('凭证已发送，请在网页中点击登录');
        }

        function exitFullscreen() {
            document.getElementById('fullscreenModal').style.display = 'none';
            document.getElementById('fullscreenIframe').src = '';
            document.getElementById('fullscreenLoginHelper').style.display = 'none';
        }

        function refreshFullscreen() {
            const iframe = document.getElementById('fullscreenIframe');
            iframe.src = iframe.src;
        }

        // Modal operations
        function openAddModal() {
            document.getElementById('modalTitle').textContent = '添加 Dashboard';
            document.getElementById('editId').value = '';
            document.getElementById('dashName').value = '';
            document.getElementById('dashUrl').value = '';
            document.getElementById('dashDesc').value = '';
            document.getElementById('dashCategory').value = 'general';
            document.getElementById('dashLoginMode').value = 'auto';
            document.getElementById('dashUsername').value = '';
            document.getElementById('dashPassword').value = '';
            document.getElementById('dashLoginNote').value = '';
            selectLoginMode('auto');
            currentTags = [];
            renderTagInput();
            document.getElementById('addModal').style.display = 'flex';
        }

        function openEditModal(id) {
            const dashboard = dashboards.find(d => d.id === id);
            if (!dashboard) return;

            document.getElementById('modalTitle').textContent = '编辑 Dashboard';
            document.getElementById('editId').value = id;
            document.getElementById('dashName').value = dashboard.name;
            document.getElementById('dashUrl').value = dashboard.url;
            document.getElementById('dashDesc').value = dashboard.desc || '';
            document.getElementById('dashCategory').value = dashboard.category || 'general';
            document.getElementById('dashUsername').value = dashboard.username || '';
            document.getElementById('dashPassword').value = dashboard.password || '';
            document.getElementById('dashLoginNote').value = dashboard.loginNote || '';
            selectLoginMode(dashboard.loginMode || 'auto');
            currentTags = dashboard.tags || [];
            renderTagInput();
            document.getElementById('addModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('addModal').style.display = 'none';
        }

        // Login mode selection
        function selectLoginMode(mode) {
            document.getElementById('dashLoginMode').value = mode;
            document.querySelectorAll('.login-mode-option').forEach(el => {
                el.classList.toggle('selected', el.dataset.mode === mode);
            });

            // Show/hide relevant sections
            const autoInfo = document.getElementById('autoLoginInfo');
            const credSection = document.getElementById('credentialsSection');

            switch(mode) {
                case 'auto':
                    autoInfo.style.display = 'block';
                    credSection.style.display = 'none';
                    break;
                case 'manual':
                    autoInfo.style.display = 'none';
                    credSection.style.display = 'block';
                    break;
                case 'none':
                    autoInfo.style.display = 'none';
                    credSection.style.display = 'none';
                    break;
            }
        }

        // Password visibility toggle
        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // Tag input handling
        function renderTagInput() {
            const container = document.getElementById('tagContainer');
            container.innerHTML = currentTags.map((tag, i) => `
                <span class="tag">
                    ${escapeHtml(tag)}
                    <span class="remove" onclick="removeTag(${i})">&times;</span>
                </span>
            `).join('') + '<input type="text" id="tagInput" placeholder="输入标签后按回车..." onkeypress="handleTagInput(event)">';
        }

        function handleTagInput(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const input = document.getElementById('tagInput');
                const tag = input.value.trim();
                if (tag && !currentTags.includes(tag)) {
                    currentTags.push(tag);
                    renderTagInput();
                }
                input.value = '';
            }
        }

        function removeTag(index) {
            currentTags.splice(index, 1);
            renderTagInput();
        }

        // Save dashboard
        function saveDashboard() {
            const name = document.getElementById('dashName').value.trim();
            const url = document.getElementById('dashUrl').value.trim();
            const desc = document.getElementById('dashDesc').value.trim();
            const category = document.getElementById('dashCategory').value;
            const loginMode = document.getElementById('dashLoginMode').value;
            const username = document.getElementById('dashUsername').value.trim();
            const password = document.getElementById('dashPassword').value;
            const loginNote = document.getElementById('dashLoginNote').value.trim();
            const editId = document.getElementById('editId').value;

            if (!name || !url) {
                alert('请填写名称和 URL');
                return;
            }

            if (!isValidUrl(url)) {
                alert('请输入有效的 URL');
                return;
            }

            const dashboard = {
                id: editId || generateId(),
                name,
                url,
                desc,
                category,
                loginMode,
                username: loginMode === 'manual' ? username : '',
                password: loginMode === 'manual' ? password : '',
                loginNote: loginMode === 'manual' ? loginNote : '',
                tags: [...currentTags],
                createdAt: editId ? dashboards.find(d => d.id === editId)?.createdAt : Date.now()
            };

            if (editId) {
                const index = dashboards.findIndex(d => d.id === editId);
                if (index !== -1) {
                    dashboards[index] = dashboard;
                }
            } else {
                dashboards.push(dashboard);
            }

            // Update allTags
            currentTags.forEach(t => allTags.add(t));

            saveData();
            renderDashboardList();
            updateTagFilter();
            updateDashboardCount();
            closeModal();
        }

        // Delete dashboard
        function deleteDashboard(id) {
            if (!confirm('确定要删除这个 Dashboard 吗？')) return;
            
            dashboards = dashboards.filter(d => d.id !== id);
            activeTabs = activeTabs.filter(t => t !== id);
            
            if (currentLoginDashboard?.id === id) {
                hideLoginHelper();
            }
            
            // Rebuild allTags
            allTags.clear();
            dashboards.forEach(d => {
                if (d.tags) {
                    d.tags.forEach(t => allTags.add(t));
                }
            });

            saveData();
            renderDashboardList();
            updateTagFilter();
            updateDashboardCount();
            renderTabs();
            renderIframes();
        }

        // Quick add
        function handleQuickAdd(e) {
            if (e.key === 'Enter') {
                quickAdd();
            }
        }

        function quickAdd() {
            const input = document.getElementById('quickAddUrl');
            const url = input.value.trim();
            
            if (!url) return;
            
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            if (!isValidUrl(url)) {
                alert('请输入有效的 URL');
                return;
            }

            // Extract name from URL
            let name = url;
            try {
                const u = new URL(url);
                name = u.hostname.replace('www.', '');
            } catch (e) {}

            const dashboard = {
                id: generateId(),
                name,
                url,
                desc: '',
                category: 'general',
                loginMode: 'auto', // Default to browser auto-login
                username: '',
                password: '',
                loginNote: '',
                tags: [],
                createdAt: Date.now()
            };

            dashboards.push(dashboard);
            saveData();
            renderDashboardList();
            updateDashboardCount();
            input.value = '';
            showNotification(`已添加: ${name} (浏览器自动登录)`);
        }

        // Notification
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: #3b82f6;
                color: white;
                padding: 12px 20px;
                border-radius: 8px;
                z-index: 3000;
                animation: slideIn 0.3s ease;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // Import/Export
        function exportData() {
            const dataStr = JSON.stringify(dashboards, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `dashboard-config-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const imported = JSON.parse(e.target.result);
                        if (Array.isArray(imported)) {
                            dashboards = imported;
                            saveData();
                            renderDashboardList();
                            updateTagFilter();
                            updateDashboardCount();
                            showNotification('配置导入成功！');
                        } else {
                            alert('无效的配置文件格式');
                        }
                    } catch (err) {
                        alert('文件解析失败: ' + err.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // Utilities
        function generateId() {
            return 'dash_' + Math.random().toString(36).substr(2, 9);
        }

        function isValidUrl(string) {
            try {
                new URL(string);
                return true;
            } catch (_) {
                return false;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                exitFullscreen();
                hideLoginHelper();
            }
            if (e.ctrlKey && e.key === 'k') {
                e.preventDefault();
                document.getElementById('searchFilter').focus();
            }
        });
    </script>
</body>
</html>
